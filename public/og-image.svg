  </text>
  <g transform="translate(100, 560)">
    <circle cx="15" cy="15" r="15" fill="url(#accent)"/>
    <text x="40" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#e2e8f0">Deploy AI agents to production</text>
  </g>
