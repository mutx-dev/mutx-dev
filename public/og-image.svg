  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <g transform="translate(600, 280)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="700" fill="#ffffff" text-anchor="middle">
