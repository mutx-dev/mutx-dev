route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'web.hook'
  routes:
    # Self-healing routes for critical alerts
    - matchers:
        - severity="critical"
      receiver: 'self-heal'
      continue: true

    # Webhook notifications
    - matchers:
        - notify="webhook"
      receiver: 'web.hook'

# Receiver definitions
receivers:
  - name: 'null'

  - name: 'web.hook'
    webhook_configs:
      - url: 'http://127.0.0.1:5001/'
        send_resolved: true

  # Self-healing receiver - calls healing scripts
  - name: 'self-heal'
    webhook_configs:
      # AlertManager will POST to this endpoint which should run self-heal.sh
      # In production, this would be a webhook receiver that parses the alert
      # and calls the appropriate healing script
      - url: 'http://host.docker.internal:3000/api/heal'
        send_resolved: true
        http_config:
          # Require a shared bearer token so /api/heal can't be triggered
          # by unauthenticated requests.
          authorization:
            type: Bearer
            credentials_file: /etc/alertmanager/secrets/self_heal_webhook_token
          timeout: 30s

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'dev', 'instance']
