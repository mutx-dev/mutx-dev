groups:
  - name: mutx-core
    rules:
      - alert: MutxApiDown
        expr: up{job="mutx-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MUTX API target is down"
          description: "Prometheus cannot scrape mutx-api for more than 2 minutes."

      - alert: HighApiP95Latency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="mutx-api"}[5m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High API p95 latency"
          description: "MUTX API p95 latency is above 1s for 10 minutes."

      - alert: HighApiP99Latency
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job="mutx-api"}[5m])) by (le)) > 5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Critical API p99 latency"
          description: "MUTX API p99 latency is above 5s for 10 minutes."

      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{job="mutx-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{job="mutx-api"}[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for 5 minutes."

      - alert: High4xxRate
        expr: sum(rate(http_requests_total{job="mutx-api",status=~"4.."}[5m])) / sum(rate(http_requests_total{job="mutx-api"}[5m])) > 0.20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High 4xx error rate"
          description: "4xx error rate is above 20% for 10 minutes - possible authentication or validation issues."

      - alert: RedisExporterDown
        expr: up{job="redis-exporter"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis exporter is down"
          description: "No Redis metrics for 5 minutes."

      - alert: PostgresExporterDown
        expr: up{job="postgres-exporter"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres exporter is down"
          description: "No Postgres metrics for 5 minutes."

      - alert: NodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node exporter is down"
          description: "Host-level metrics are unavailable for 5 minutes."

      - alert: HostHighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage is above 90%"
          description: "Node memory pressure has stayed above 90% for 10 minutes."

      - alert: HostCriticalMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host memory usage is critical (95%+)"
          description: "Node memory pressure has stayed above 95% for 5 minutes."

      - alert: HostDiskAlmostFull
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay",mountpoint="/"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint="/"}) < 0.15
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Root filesystem is running low"
          description: "Available space on / is below 15% for at least 15 minutes."

      - alert: HostDiskFull
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay",mountpoint="/"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint="/"}) < 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Root filesystem is critical (<5%)"
          description: "Available space on / is below 5% - immediate action required."

      - alert: HostHighCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU usage is above 90%"
          description: "CPU usage has stayed above 90% for 15 minutes."

      - alert: PostgresConnectionExhaustion
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection pool near exhaustion"
          description: "Database is using more than 80% of available connections."

      - alert: PostgresSlowQueries
        expr: rate(pg_stat_statements_mean_exec_time[5m]) > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "Average query execution time is above 1 second."

      - alert: MutxWorkerDown
        expr: up{job="mutx-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MUTX worker is down"
          description: "Worker cannot be scraped for more than 2 minutes."

      - alert: MutxSchedulerDown
        expr: up{job="mutx-scheduler"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MUTX scheduler is down"
          description: "Scheduler cannot be scraped for more than 2 minutes."

      - alert: AgentExecutionFailureRate
        expr: sum(rate(agent_executions_total{status="failed"}[5m])) / sum(rate(agent_executions_total[5m])) > 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High agent execution failure rate"
          description: "More than 10% of agent executions are failing."

      - alert: TaskQueueBacklog
        expr: mutx_tasks_pending > 1000
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Task queue backlog growing"
          description: "More than 1000 tasks are pending execution."

      - alert: TaskQueueStalled
        expr: mutx_tasks_pending > 5000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Task queue stalled - critical backlog"
          description: "More than 5000 tasks are pending - system may be stalled."

      - alert: AuthTokenExpirationWarning
        expr: time() - auth_token_expiry < 3600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Auth token expiring soon"
          description: "Authentication token will expire within 1 hour."

      - alert: WebhookDeliveryFailure
        expr: sum(rate(webhook_delivery_failed_total[5m])) / sum(rate(webhook_delivery_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High webhook delivery failure rate"
          description: "More than 5% of webhook deliveries are failing."

      - alert: LLMProviderRateLimit
        expr: llm_requests_ratelimited_total > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM provider rate limit hit"
          description: "Requests are being rate limited by the LLM provider."

      - alert: LLMProviderError
        expr: sum(rate(llm_requests_errors_total[5m])) / sum(rate(llm_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High LLM provider error rate"
          description: "More than 5% of LLM requests are failing."

      - alert: RedisConnectionFailure
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis server is not responding."

      - alert: PostgresConnectionFailure
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL server is not responding."

      - alert: CertificateExpirationWarning
        expr: (certify_not_after - time()) < 2592000
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS certificate expiring soon"
          description: "Certificate will expire within 30 days."

      - alert: CertificateExpirationCritical
        expr: (certify_not_after - time()) < 604800
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "TLS certificate expiring critically soon"
          description: "Certificate will expire within 7 days."


      - alert: NoActiveAgents
        expr: mutx_agents_total > 0 and mutx_agents_active == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No agents active despite configured agents"
          description: "System has {{ $value }} agents configured but none are running."

      - alert: DatabasePoolOverflow
        expr: db_pool_overflow > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool overflow active"
          description: "Using {{ $value }} overflow connections - consider increasing pool size."

      - alert: HighHTTPActiveConnections
        expr: http_connections_active > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of active HTTP connections"
          description: "{{ $value }} concurrent connections - possible load issue."

      - alert: CriticalHTTPActiveConnections
        expr: http_connections_active > 5000
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical number of active HTTP connections"
          description: "{{ $value }} concurrent connections - immediate intervention required."

      - alert: AgentTaskTimeoutRate
        expr: sum(rate(mutx_agent_tasks_total{status="timeout"}[5m])) > 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "High rate of agent task timeouts"
          description: "More than 10% of tasks are timing out."

      - alert: DeploymentFailureRate
        expr: sum(rate(mutx_deployments_by_status{status="failed"}[5m])) / sum(rate(mutx_deployments_by_status[5m])) > 0.15
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "High deployment failure rate"
          description: "More than 15% of deployments are failing."
