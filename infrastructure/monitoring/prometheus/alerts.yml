groups:
  - name: mutx-core
    rules:
      - alert: MutxApiDown
        expr: up{job="mutx-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MUTX API target is down"
          description: "Prometheus cannot scrape mutx-api for more than 2 minutes."

      - alert: HighApiP95Latency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="mutx-api"}[5m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High API p95 latency"
          description: "MUTX API p95 latency is above 1s for 10 minutes."

      - alert: HighApiP99Latency
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job="mutx-api"}[5m])) by (le)) > 5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Critical API p99 latency"
          description: "MUTX API p99 latency is above 5s for 10 minutes."

      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{job="mutx-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{job="mutx-api"}[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for 5 minutes."

      - alert: High4xxRate
        expr: sum(rate(http_requests_total{job="mutx-api",status=~"4.."}[5m])) / sum(rate(http_requests_total{job="mutx-api"}[5m])) > 0.20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High 4xx error rate"
          description: "4xx error rate is above 20% for 10 minutes - possible authentication or validation issues."

      - alert: RedisExporterDown
        expr: up{job="redis-exporter"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis exporter is down"
          description: "No Redis metrics for 5 minutes."

      - alert: PostgresExporterDown
        expr: up{job="postgres-exporter"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres exporter is down"
          description: "No Postgres metrics for 5 minutes."

      - alert: NodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node exporter is down"
          description: "Host-level metrics are unavailable for 5 minutes."

      - alert: HostHighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage is above 90%"
          description: "Node memory pressure has stayed above 90% for 10 minutes."

      - alert: HostCriticalMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host memory usage is critical (95%+)"
          description: "Node memory pressure has stayed above 95% for 5 minutes."

      - alert: HostDiskAlmostFull
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay",mountpoint="/"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint="/"}) < 0.15
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Root filesystem is running low"
          description: "Available space on / is below 15% for at least 15 minutes."

      - alert: HostDiskFull
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay",mountpoint="/"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint="/"}) < 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Root filesystem is critical (<5%)"
          description: "Available space on / is below 5% - immediate action required."

      - alert: HostHighCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU usage is above 90%"
          description: "CPU usage has stayed above 90% for 15 minutes."

      - alert: PostgresConnectionExhaustion
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection pool near exhaustion"
          description: "Database is using more than 80% of available connections."

      - alert: PostgresSlowQueries
        expr: rate(pg_stat_statements_mean_exec_time[5m]) > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "Average query execution time is above 1 second."

      # Critical conditions - Queue & Agent alerts
      - alert: HighQueueBacklog
        expr: mutx_queue_size > 100
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High queue backlog detected"
          description: "Agent task queue has over 100 pending tasks for 15 minutes - possible processing delay."

      - alert: CriticalQueueBacklog
        expr: mutx_queue_size > 500
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Critical queue backlog"
          description: "Agent task queue has over 500 pending tasks - immediate attention required."

      - alert: NoActiveAgents
        expr: mutx_agents_active == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No active agents"
          description: "No agents are currently active - system may be unresponsive."

      - alert: HighAgentTaskFailureRate
        expr: sum(rate(mutx_agent_tasks_total{status="failed"}[5m])) / sum(rate(mutx_agent_tasks_total[5m])) > 0.20
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "High agent task failure rate"
          description: "More than 20% of agent tasks are failing - investigate agent errors."

      - alert: AgentTaskTimeout
        expr: sum(rate(mutx_agent_tasks_total{status="timeout"}[5m])) / sum(rate(mutx_agent_tasks_total[5m])) > 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High agent task timeout rate"
          description: "More than 10% of agent tasks are timing out."

      # Deployment alerts
      - alert: HighDeploymentFailureRate
        expr: sum(rate(mutx_deployments_by_status{status="failed"}[5m])) / sum(rate(mutx_deployments_by_status[5m])) > 0.15
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "High deployment failure rate"
          description: "More than 15% of deployments are failing."

      # Authentication alerts
      - alert: HighAuthFailureRate
        expr: sum(rate(http_requests_total{job="mutx-api",status="401"}[5m])) / sum(rate(http_requests_total{job="mutx-api"}[5m])) > 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High authentication failure rate"
          description: "More than 10% of requests are returning 401 - possible brute force attack."

      - alert: CriticalAuthFailureRate
        expr: sum(rate(http_requests_total{job="mutx-api",status="401"}[5m])) / sum(rate(http_requests_total{job="mutx-api"}[5m])) > 0.30
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical authentication failure rate"
          description: "More than 30% of requests are returning 401 - probable security incident."

      # Redis alerts
      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 90%"
          description: "Redis is using more than 90% of available memory."

      - alert: RedisCriticalMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Redis memory usage critical"
          description: "Redis is using more than 95% of available memory - eviction imminent."

      # Critical error spike
      - alert: CriticalErrorSpike
        expr: sum(rate(mutx_errors_total[5m])) > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical error spike detected"
          description: "More than 10 errors per second detected - investigate immediately."

      # Database critical
      - alert: PostgresCriticalConnectionExhaustion
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL connection pool critical"
          description: "Database is using more than 95% of available connections - service degradation imminent."

      # API availability
      - alert: MutxApiDegraded
        expr: up{job="mutx-api"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "MUTX API is down"
          description: "Prometheus cannot scrape mutx-api - service unavailable."

      # Queue-specific alerts for self-healing
      - alert: TaskQueueBacklog
        expr: sum(rate(mutx_task_queue_size[5m])) > 1000
        for: 15m
        labels:
          severity: warning
          self_heal: "queue"
        annotations:
          summary: "Task queue backlog building"
          description: "Task queue backlog exceeds 1000 items for 15 minutes. Will trigger queue drain."

      - alert: TaskQueueStalled
        expr: sum(rate(mutx_tasks_stalled_total[5m])) > 0
        for: 5m
        labels:
          severity: critical
          self_heal: "queue"
        annotations:
          summary: "Tasks stalled in queue"
          description: "Detected stalled tasks. Will trigger queue recovery."
