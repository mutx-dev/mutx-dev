{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mutx.fullname" . }}
  labels:
    {{- include "mutx.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    {{- if .Values.ingress.tls.hosts }}
    {{- range .Values.ingress.tls.hosts }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
    {{- else }}
    - hosts:
      {{- range .Values.ingress.hosts }}
        - {{ .apiHost | quote }}
        - {{ .webHost | quote }}
      {{- end }}
      secretName: {{ .Values.ingress.tls.secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    {{- if $.Values.api.enabled }}
    - host: {{ .apiHost }}
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "mutx.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "mutx.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: {{ include "mutx.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: {{ include "mutx.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: {{ include "mutx.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: {{ include "mutx.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
    {{- end }}
    {{- if $.Values.web.enabled }}
    - host: {{ .webHost }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "mutx.fullname" $ }}-web
                port:
                  number: {{ $.Values.web.service.port }}
          {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
