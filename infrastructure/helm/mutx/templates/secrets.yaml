apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mutx.fullname" . }}-secrets
  labels:
    {{- include "mutx.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.databaseUrl }}
  databaseUrl: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  {{- else if .Values.postgres.enabled }}
  databaseUrl: {{ printf "postgresql://mutx:changeme@%s-postgres:5432/mutx" (include "mutx.fullname" .) | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.databaseSslMode }}
  databaseSslMode: {{ .Values.secrets.databaseSslMode | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtSecret }}
  jwtSecret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- else }}
  jwtSecret: {{ randAlphaNum 48 | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.secretEncryptionKey }}
  secretEncryptionKey: {{ .Values.secrets.secretEncryptionKey | b64enc | quote }}
  {{- else }}
  secretEncryptionKey: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.redisUrl }}
  redisUrl: {{ .Values.secrets.redisUrl | b64enc | quote }}
  {{- else if .Values.redis.enabled }}
  redisUrl: {{ printf "redis://%s-redis:6379/0" (include "mutx.fullname" .) | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpHost }}
  smtpHost: {{ .Values.secrets.smtpHost | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpPort }}
  smtpPort: {{ .Values.secrets.smtpPort | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpUser }}
  smtpUser: {{ .Values.secrets.smtpUser | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpPassword }}
  smtpPassword: {{ .Values.secrets.smtpPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpFromEmail }}
  smtpFromEmail: {{ .Values.secrets.smtpFromEmail | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.resendApiKey }}
  resendApiKey: {{ .Values.secrets.resendApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.telegramBotToken }}
  telegramBotToken: {{ .Values.secrets.telegramBotToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.turnstileSecretKey }}
  turnstileSecretKey: {{ .Values.secrets.turnstileSecretKey | b64enc | quote }}
  {{- end }}
  # -- PostgreSQL internal credentials (used only when postgres.enabled=true)
  {{- if .Values.postgres.enabled }}
  postgresUser: {{ "mutx" | b64enc | quote }}
  postgresPassword: {{ randAlphaNum 32 | b64enc | quote }}
  postgresDb: {{ "mutx" | b64enc | quote }}
  {{- end }}
