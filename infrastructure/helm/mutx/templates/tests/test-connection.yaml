apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mutx.fullname" . }}-test-connection"
  labels:
    {{- include "mutx.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: curl
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          echo "Testing API health endpoint..." &&
          curl -sf http://{{ include "mutx.fullname" . }}-api:{{ .Values.api.service.port }}/health &&
          echo "" &&
          echo "Testing API ready endpoint..." &&
          curl -sf http://{{ include "mutx.fullname" . }}-api:{{ .Values.api.service.port }}/ready &&
          echo "" &&
          echo "All tests passed!"
  restartPolicy: Never
