apiVersion: v1
kind: Service
metadata:
  name: {{ include "mutx.fullname" . }}-test
  labels:
    {{- include "mutx.labels" . | nindent 4 }}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "mutx.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for service..." && \
              sleep 5 && \
              curl -v http://{{ include "mutx.fullname" . }}:{{ .Values.service.port }}/health || exit 1
      restartPolicy: Never
