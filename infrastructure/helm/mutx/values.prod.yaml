# =============================================================================
# MUTX Production Values Overlay
# Usage: helm install mutx ./infrastructure/helm/mutx -f ./infrastructure/helm/mutx/values.prod.yaml
# =============================================================================

global:
  imageTag: ""  # Set via --set global.imageTag=<version> or CI/CD

api:
  replicaCount: 3
  image:
    pullPolicy: Always
  webConcurrency: 2
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    ENVIRONMENT: production
    LOG_LEVEL: WARNING
    JSON_LOGGING: "true"
    DATABASE_REQUIRED_ON_STARTUP: "true"
    BACKGROUND_MONITOR_ENABLED: "false"
    EXPOSE_API_DOCS_IN_PRODUCTION: "false"
    FORWARDED_ALLOW_IPS: "*"
  pdb:
    enabled: true
    minAvailable: 2
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: api

web:
  replicaCount: 2
  image:
    pullPolicy: Always
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  buildArgs:
    NEXT_PUBLIC_API_URL: "https://api.mutx.dev"
    NEXT_PUBLIC_SITE_URL: "https://app.mutx.dev"
  pdb:
    enabled: true
    minAvailable: 1

redis:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  commandArgs: >-
    redis-server
    --appendonly yes
    --maxmemory 256mb
    --maxmemory-policy allkeys-lru
    --timeout 60
    --tcp-keepalive 300
  persistence:
    size: 5Gi

# Use managed PostgreSQL in production
postgres:
  enabled: false

otelCollector:
  enabled: true
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

ingress:
  enabled: true
  className: nginx
  hosts:
    - apiHost: api.mutx.dev
      webHost: app.mutx.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: mutx-tls-prod

otel:
  tracesExporter: otlp
  exporterOtlpEndpoint: "http://mutx-otel-collector:4317"
  tracesSampler: parentbased_traceidratio
  tracesSamplerArg: "0.1"
