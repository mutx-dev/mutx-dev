# =============================================================================
# Production Docker Compose for MUTX API
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mutx-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mutx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mutx}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mutx} -d ${POSTGRES_DB:-mutx}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mutx-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # Security: Don't expose postgres externally
    # ports:  # Commented out - only accessible within network

  redis:
    image: redis:7-alpine
    container_name: mutx-redis-prod
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --timeout 60
      --tcp-keepalive 300
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mutx-network
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    # Security: Don't expose redis externally
    # ports:  # Commented out - only accessible within network

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api.production
    container_name: mutx-api-prod
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-4}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_SSL_MODE=${DATABASE_SSL_MODE:-require}
      - DATABASE_REQUIRED_ON_STARTUP=${DATABASE_REQUIRED_ON_STARTUP:-false}
      - JWT_SECRET=${JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://mutx.dev,https://app.mutx.dev}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mutx-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    # Health check is built into the Dockerfile
    # Production: Don't expose API directly, use nginx
    # ports:
    #   - "8000:8000"

  nginx:
    image: nginx:alpine
    container_name: mutx-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mutx-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mutx-network:
    driver: bridge
    name: mutx_prod_network
