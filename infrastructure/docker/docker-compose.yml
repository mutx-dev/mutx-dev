
services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mutx-postgres
    environment:
      POSTGRES_USER: mutx
      POSTGRES_PASSWORD: mutx_password
      POSTGRES_DB: mutx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mutx"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mutx-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mutx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mutx-network

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: development
    container_name: mutx-api
    environment:
      DATABASE_URL: postgresql://mutx:mutx_password@postgres:5432/mutx
      DATABASE_SSL_MODE: disable
      API_HOST: 0.0.0.0
      API_PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mutx-network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    container_name: mutx-frontend
    environment:
      DATABASE_URL: postgresql://mutx:mutx_password@postgres:5432/mutx
      DATABASE_SSL_MODE: disable
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NODE_ENV: development
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./next.config.js:/app/next.config.js
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - mutx-network

volumes:
  postgres_data:
  redis_data:

networks:
  mutx-network:
    driver: bridge
