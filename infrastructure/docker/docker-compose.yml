
name: ${MUTX_COMPOSE_PROJECT:-mutx}

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mutx
      POSTGRES_PASSWORD: mutx_password
      POSTGRES_DB: mutx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mutx"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mutx-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mutx-network

  # Backend API
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
      target: development
    environment:
      DATABASE_URL: postgresql://mutx:mutx_password@postgres:5432/mutx
      DATABASE_SSL_MODE: disable
      DATABASE_REQUIRED_ON_STARTUP: "true"
      API_HOST: 0.0.0.0
      API_PORT: 8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ../../src:/app/src
      - ../../requirements.txt:/app/requirements.txt
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mutx-network

  migrate:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
      target: development
    restart: "no"
    environment:
      DATABASE_URL: postgresql://mutx:mutx_password@postgres:5432/mutx
      DATABASE_SSL_MODE: disable
      DATABASE_REQUIRED_ON_STARTUP: "true"
      BACKGROUND_MONITOR_ENABLED: "false"
      ENVIRONMENT: development
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mutx-network

  # Frontend
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
      target: development
    environment:
      DATABASE_URL: postgresql://mutx:mutx_password@postgres:5432/mutx
      DATABASE_SSL_MODE: disable
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NODE_ENV: development
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - ../../:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - mutx-network

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  frontend_next:

networks:
  mutx-network:
    driver: bridge
