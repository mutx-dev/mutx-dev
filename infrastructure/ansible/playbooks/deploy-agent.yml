---
- name: Deploy Agent Containers
  hosts: agents
  become: true
  vars:
    agent_image: "mutxdev/agent:latest"
    agent_name: "mutx-agent"
    agent_port: 8080
    agent_log_level: "info"
    postgres_host: "localhost"
    postgres_port: 5432
    postgres_db: "agent_db"
    postgres_user: "agent_user"
    postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
    redis_host: "localhost"
    redis_port: 6379
    redis_password: "{{ lookup('env', 'REDIS_PASSWORD') }}"
    agent_api_key: "{{ lookup('env', 'AGENT_API_KEY') }}"
    agent_secret_key: "{{ lookup('env', 'AGENT_SECRET_KEY') }}"
    agent_volume_path: "/opt/agent/data"
    systemd_unit_name: "mutx-agent"

  tasks:
    - name: Include Agent role
      ansible.builtin.include_role:
        name: agent

    - name: Verify agent is running
      community.docker.docker_container:
        name: "{{ agent_name }}"
        state: started
      register: container_status

    - name: Wait for agent API to be ready
      ansible.builtin.wait_for:
        port: "{{ agent_port }}"
        delay: 5
        timeout: 60
      when: container_status.changed

    - name: Get agent container status
      community.docker.docker_container_info:
        name: "{{ agent_name }}"
      register: agent_info

    - name: Display agent status
      ansible.builtin.debug:
        msg: "Agent {{ agent_name }} is {{ 'running' if agent_info.container.State.Running else 'stopped' }}"
