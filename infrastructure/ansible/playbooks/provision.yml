---
- name: Provision Agent Infrastructure
  hosts: agents,monitoring
  become: true
  vars:
    postgres_version: "15"
    postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
    redis_password: "{{ lookup('env', 'REDIS_PASSWORD') }}"
    tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY') }}"
    admin_cidr: "{{ lookup('env', 'ADMIN_CIDR') | default('0.0.0.0/0', true) }}"
    private_cidr: "{{ lookup('env', 'PRIVATE_CIDR') | default('10.0.0.0/8', true) }}"
    ufw_rules:
      - rule: allow
        port: "22"
        src: "{{ admin_cidr }}"
        comment: "SSH"
      - rule: allow
        port: "5432"
        src: "{{ private_cidr }}"
        comment: "PostgreSQL"
      - rule: allow
        port: "6379"
        src: "{{ private_cidr }}"
        comment: "Redis"
      - rule: allow
        port: "8080"
        src: "{{ private_cidr }}"
        comment: "Agent API"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - gnupg2
          - ca-certificates
          - software-properties-common
          - ufw
          - fail2ban
          - auditd
          - python3-pip
        state: present

    - name: Include Docker role
      ansible.builtin.include_role:
        name: docker

    - name: Validate required secrets are provided
      ansible.builtin.assert:
        that:
          - postgres_password | length > 0
          - redis_password | length > 0
        fail_msg: "POSTGRES_PASSWORD and REDIS_PASSWORD must be set in the environment before provisioning"

    - name: Configure PostgreSQL
      when: "'agents' in group_names"
      block:
        - name: Add PostgreSQL APT repository
          ansible.builtin.apt_repository:
            repo: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
            state: present

        - name: Install PostgreSQL
          ansible.builtin.apt:
            name: "postgresql-{{ postgres_version }}"
            state: present

        - name: Start PostgreSQL service
          ansible.builtin.systemd:
            name: postgresql
            state: started
            enabled: true

        - name: Create application database
          become: true
          become_user: postgres
          community.postgresql.postgresql_db:
            name: agent_db
            encoding: UTF-8

        - name: Create application user
          become: true
          become_user: postgres
          community.postgresql.postgresql_user:
            name: agent_user
            password: "{{ postgres_password }}"
            db: agent_db
            state: present

        - name: Grant application user privileges
          become: true
          become_user: postgres
          community.postgresql.postgresql_privs:
            db: agent_db
            privs: ALL
            roles: agent_user
            type: database

        - name: Configure PostgreSQL listen addresses
          ansible.builtin.lineinfile:
            path: /etc/postgresql/{{ postgres_version }}/main/postgresql.conf
            regexp: "^listen_addresses"
            line: "listen_addresses = '*'"
          notify: Restart PostgreSQL

    - name: Configure Redis
      when: "'agents' in group_names"
      block:
        - name: Install Redis
          ansible.builtin.apt:
            name: redis-server
            state: present

        - name: Configure Redis bind address
          ansible.builtin.lineinfile:
            path: /etc/redis/redis.conf
            regexp: "^bind"
            line: "bind 0.0.0.0"
          notify: Restart Redis

        - name: Configure Redis password
          ansible.builtin.lineinfile:
            path: /etc/redis/redis.conf
            regexp: "^# requirepass"
            line: "requirepass {{ redis_password }}"
          notify: Restart Redis

        - name: Start Redis service
          ansible.builtin.systemd:
            name: redis-server
            state: started
            enabled: true

    - name: Install and configure Tailscale
      when: tailscale_auth_key is defined and tailscale_auth_key != ""
      block:
        - name: Add Tailscale GPG key
          ansible.builtin.apt_key:
            url: https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_version }}/no.gpg.key
            state: present

        - name: Add Tailscale repository
          ansible.builtin.apt_repository:
            repo: "deb https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} main"
            state: present

        - name: Install Tailscale
          ansible.builtin.apt:
            name: tailscale
            state: present

        - name: Start Tailscale
          ansible.builtin.command: tailscale up --auth-key {{ tailscale_auth_key }} --operator root
          register: tailscale_up
          changed_when: tailscale_up.rc == 0
          failed_when:
            - tailscale_up.rc != 0
            - "'already' not in (((tailscale_up.stdout | default('')) ~ ' ' ~ (tailscale_up.stderr | default(''))) | lower)"

        - name: Enable Tailscale service
          ansible.builtin.systemd:
            name: tailscaled
            enabled: true
            state: started

    - name: Configure UFW firewall
      community.general.ufw:
        state: enabled
        policy: deny

    - name: Add UFW rules
      community.general.ufw:
        rule: "{{ item.rule }}"
        port: "{{ item.port }}"
        from_ip: "{{ item.src | default(omit) }}"
        comment: "{{ item.comment }}"
      loop: "{{ ufw_rules }}"

    - name: SSH hardening - Disable password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PasswordAuthentication"
        line: "PasswordAuthentication no"
      notify: Restart SSH

    - name: SSH hardening - Disable root login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PermitRootLogin"
        line: "PermitRootLogin no"
      notify: Restart SSH

    - name: SSH hardening - Use only SSHv2
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^Protocol"
        line: "Protocol 2"
      notify: Restart SSH

    - name: SSH hardening - Disable X11Forwarding
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^X11Forwarding"
        line: "X11Forwarding no"
      notify: Restart SSH

    - name: Configure fail2ban
      ansible.builtin.template:
        src: fail2ban.j2
        dest: /etc/fail2ban/jail.local
        mode: "0644"
      vars:
        fail2ban_bantime: 3600
        fail2ban_findtime: 600
        fail2ban_maxretry: 3
      notify: Restart fail2ban

  handlers:
    - name: Restart PostgreSQL
      ansible.builtin.systemd:
        name: postgresql
        state: restarted

    - name: Restart Redis
      ansible.builtin.systemd:
        name: redis-server
        state: restarted

    - name: Restart SSH
      ansible.builtin.systemd:
        name: sshd
        state: restarted

    - name: Restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted
