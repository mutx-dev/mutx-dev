<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">mutx.dev architecture at a glance</title>
  <desc id="desc">A simple four-node diagram showing the Next.js surfaces, FastAPI control plane, data layer, and infrastructure lane.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <style>
      .title { font: 700 34px system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; }
      .copy { font: 500 18px system-ui, -apple-system, Segoe UI, sans-serif; fill: #cbd5e1; }
      .label { font: 600 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #94a3b8; letter-spacing: 0.12em; text-transform: uppercase; }
      .card-title { font: 700 24px system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; }
      .card-copy { font: 500 16px system-ui, -apple-system, Segoe UI, sans-serif; fill: #cbd5e1; }
      .line { stroke: #475569; stroke-width: 4; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#bg)" />
  <rect x="18" y="18" width="1164" height="484" rx="22" fill="none" stroke="#1e293b" stroke-width="2" />

  <text x="56" y="72" class="title">mutx.dev in one picture</text>
  <text x="56" y="102" class="copy">One repo for the website, control plane, data layer, and provisioning lane.</text>

  <rect x="56" y="160" width="252" height="122" rx="22" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="80" y="192" class="label">Web</text>
  <text x="80" y="232" class="card-title">Next.js surfaces</text>
  <text x="80" y="260" class="card-copy">marketing site and</text>
  <text x="80" y="284" class="card-copy">app-facing product UI</text>

  <rect x="474" y="160" width="252" height="122" rx="22" fill="#0f172a" stroke="#3b82f6" stroke-width="2" />
  <text x="498" y="192" class="label">Core</text>
  <text x="498" y="232" class="card-title">FastAPI control plane</text>
  <text x="498" y="260" class="card-copy">auth, agents, deployments,</text>
  <text x="498" y="284" class="card-copy">webhooks, health, readiness</text>

  <rect x="892" y="84" width="252" height="122" rx="22" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="916" y="116" class="label">Data</text>
  <text x="916" y="156" class="card-title">Postgres + Redis</text>
  <text x="916" y="184" class="card-copy">waitlist data, metadata,</text>
  <text x="916" y="208" class="card-copy">sessions, local services</text>

  <rect x="892" y="238" width="252" height="122" rx="22" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="916" y="270" class="label">Infra</text>
  <text x="916" y="310" class="card-title">Terraform + Ansible</text>
  <text x="916" y="338" class="card-copy">customer provisioning,</text>
  <text x="916" y="362" class="card-copy">host setup, Docker flows</text>

  <path class="line" d="M308 221 L474 221" />
  <path class="line" d="M726 221 L892 145" />
  <path class="line" d="M726 221 L892 299" />

  <circle cx="308" cy="221" r="6" fill="#38bdf8" />
  <circle cx="474" cy="221" r="6" fill="#38bdf8" />
  <circle cx="726" cy="221" r="6" fill="#38bdf8" />
  <circle cx="892" cy="145" r="6" fill="#38bdf8" />
  <circle cx="892" cy="299" r="6" fill="#38bdf8" />
</svg>
