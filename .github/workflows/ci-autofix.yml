name: CI Autofix

# ──────────────────────────────────────────────────────────────────────────────
# Self-healing workflow: reacts to CI failures and auto-fixes deterministic
# issues (stale generated artifacts, ruff format/lint drift).
# NEVER auto-fixes test failures — those are routed to humans.
# ──────────────────────────────────────────────────────────────────────────────

permissions:
  contents: write       # push fix commits
  pull-requests: write  # comment on PRs
  issues: write         # create issues for main-branch failures
  actions: read         # download CI logs

on:
  # React to CI workflow failures
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - "**"

  # Proactive drift detection every 6 hours on main
  schedule:
    - cron: "0 */6 * * *"

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      run_id:
        description: "Specific CI run ID to inspect (optional)"
        required: false
        type: string

concurrency:
  # Rate-limit: one autofix per branch per 10-minute window
  group: autofix-${{ github.event.workflow_run.head_branch || github.ref_name || 'scheduled' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Classify what went wrong
  # ──────────────────────────────────────────────────────────────────────────
  classify-failure:
    name: Classify Failure
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    outputs:
      classification: ${{ steps.classify.outputs.result }}
      branch: ${{ steps.meta.outputs.branch }}
      sha: ${{ steps.meta.outputs.sha }}
      pr_number: ${{ steps.meta.outputs.pr_number }}
      run_id: ${{ steps.meta.outputs.run_id }}

    steps:
      - name: Gather run metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            SHA="${{ github.event.workflow_run.head_sha }}"
            RUN_ID="${{ github.event.workflow_run.id }}"
            # Find associated PR
            PR_NUMBER=$(gh api "repos/${{ github.repository }}/pulls" \
              --jq ".[] | select(.head.ref == \"${BRANCH}\") | .number" | head -1)
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RUN_ID="${{ inputs.run_id || '' }}"
            if [ -n "$RUN_ID" ]; then
              RUN_DATA=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}")
              BRANCH=$(echo "$RUN_DATA" | jq -r '.head_branch')
              SHA=$(echo "$RUN_DATA" | jq -r '.head_sha')
              PR_NUMBER=$(gh api "repos/${{ github.repository }}/pulls" \
                --jq ".[] | select(.head.ref == \"${BRANCH}\") | .number" | head -1)
            else
              BRANCH="main"
              SHA="${{ github.sha }}"
              PR_NUMBER=""
            fi
          else
            # schedule — check main branch
            BRANCH="main"
            SHA="${{ github.sha }}"
            RUN_ID=""
            PR_NUMBER=""
          fi

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER:-}" >> "$GITHUB_OUTPUT"
          echo "run_id=${RUN_ID:-}" >> "$GITHUB_OUTPUT"

      - name: Download and inspect CI logs
        id: classify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLASSIFICATION="unknown"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Proactive scan — run verification locally to detect drift
            # We'll classify after checking in auto-fix job
            CLASSIFICATION="proactive-scan"
            echo "result=${CLASSIFICATION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RUN_ID="${{ steps.meta.outputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            echo "::warning::No run ID available, classifying as unknown"
            echo "result=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get the failed jobs from this run
          FAILED_JOBS=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | .name')

          echo "Failed jobs:"
          echo "$FAILED_JOBS"

          # Download logs for failed jobs
          TEMP_DIR=$(mktemp -d)
          for JOB_NAME in $FAILED_JOBS; do
            JOB_ID=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
              --jq ".jobs[] | select(.name == \"${JOB_NAME}\") | .id")
            if [ -n "$JOB_ID" ]; then
              gh api "repos/${{ github.repository }}/actions/jobs/${JOB_ID}/logs" \
                > "${TEMP_DIR}/${JOB_NAME}.log" 2>/dev/null || true
            fi
          done

          # ── Classify based on job names and log content ──
          if echo "$FAILED_JOBS" | grep -q "Frontend Validation"; then
            LOG="${TEMP_DIR}/Frontend Validation.log"
            if [ -f "$LOG" ] && grep -qiE "verify-generated-artifacts|openapi.*out of date|API types are out of date|generate:contracts" "$LOG"; then
              CLASSIFICATION="stale-artifacts"
            fi
          fi

          if [ "$CLASSIFICATION" = "unknown" ] && echo "$FAILED_JOBS" | grep -q "Python Validation"; then
            LOG="${TEMP_DIR}/Python Validation.log"
            if [ -f "$LOG" ] && grep -qiE "ruff|format.*check|would reformat" "$LOG"; then
              CLASSIFICATION="ruff-drift"
            fi
          fi

          # Check for test failures
          if [ "$CLASSIFICATION" = "unknown" ]; then
            for LOG in "${TEMP_DIR}"/*.log; do
              if grep -qiE "pytest.*failed|FAILED|test session failed|ERRORS\[" "$LOG"; then
                CLASSIFICATION="test-failure"
                break
              fi
            done
          fi

          echo ""
          echo "Classification: ${CLASSIFICATION}"
          echo "result=${CLASSIFICATION}" >> "$GITHUB_OUTPUT"

          # Clean up
          rm -rf "$TEMP_DIR"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Auto-fix deterministic issues (stale artifacts, ruff drift)
  # ──────────────────────────────────────────────────────────────────────────
  auto-fix:
    name: Auto-fix (${{ needs.classify-failure.outputs.classification }})
    runs-on: ubuntu-latest
    needs: classify-failure
    if: >
      needs.classify-failure.outputs.classification == 'stale-artifacts' ||
      needs.classify-failure.outputs.classification == 'ruff-drift' ||
      needs.classify-failure.outputs.classification == 'proactive-scan'
    timeout-minutes: 15

    steps:
      - name: Generate hermes-maintainer app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: "3391977"
          private-key: ${{ secrets.HERMES_MAINTAINER_PRIVATE_KEY }}

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.classify-failure.outputs.branch }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"
          npm ci --legacy-peer-deps

      - name: Create virtual environment for generate:contracts
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install -e ".[dev]"

      - name: Run proactive drift detection
        if: needs.classify-failure.outputs.classification == 'proactive-scan'
        id: proactive-check
        run: |
          PROACTIVE_TYPE=""

          # Check for stale artifacts
          if ! PYTHON_BIN=.venv/bin/python bash scripts/verify-generated-artifacts.sh 2>/dev/null; then
            PROACTIVE_TYPE="stale-artifacts"
            echo "Detected stale generated artifacts on main"
          fi

          # Check for ruff drift
          if [ -z "$PROACTIVE_TYPE" ]; then
            if ! .venv/bin/ruff format --check src/api cli sdk src/security 2>/dev/null; then
              PROACTIVE_TYPE="ruff-drift"
              echo "Detected ruff format drift on main"
            elif ! .venv/bin/ruff check src/api cli sdk src/security 2>/dev/null; then
              PROACTIVE_TYPE="ruff-drift"
              echo "Detected ruff lint drift on main"
            fi
          fi

          echo "proactive_type=${PROACTIVE_TYPE}" >> "$GITHUB_OUTPUT"

          if [ -z "$PROACTIVE_TYPE" ]; then
            echo "No drift detected. Exiting."
          fi

      - name: Determine fix type
        id: fix-type
        run: |
          if [ "${{ needs.classify-failure.outputs.classification }}" = "proactive-scan" ]; then
            echo "fix_type=${{ steps.proactive-check.outputs.proactive_type }}" >> "$GITHUB_OUTPUT"
          else
            echo "fix_type=${{ needs.classify-failure.outputs.classification }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fix stale generated artifacts
        if: steps.fix-type.outputs.fix_type == 'stale-artifacts'
        run: |
          PYTHON_BIN=.venv/bin/python npm run generate:contracts
          echo "--- Diff of generated files ---"
          git diff --stat docs/api/openapi.json app/types/api.ts || true

      - name: Fix ruff format and lint drift
        if: steps.fix-type.outputs.fix_type == 'ruff-drift'
        run: |
          .venv/bin/ruff format .
          .venv/bin/ruff check --fix .
          echo "--- Diff of formatted files ---"
          git diff --stat || true

      - name: Check for meaningful changes
        id: has-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changes to commit after fix"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Commit and push fix
        if: steps.has-changes.outputs.has_changes == 'true'
        env:
          GIT_AUTHOR_NAME: "hermes-maintainer[bot]"
          GIT_AUTHOR_EMAIL: "3391977+hermes-maintainer[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "hermes-maintainer[bot]"
          GIT_COMMITTER_EMAIL: "3391977+hermes-maintainer[bot]@users.noreply.github.com"
        run: |
          FIX_TYPE="${{ steps.fix-type.outputs.fix_type }}"
          BRANCH="${{ needs.classify-failure.outputs.branch }}"

          git add -A
          git commit -m "fix(ci): auto-fix ${FIX_TYPE} [skip ci]"

          # Safety: never force-push
          git pull --rebase origin "${BRANCH}" || true
          git push origin "HEAD:${BRANCH}"

          echo "::notice::Pushed ${FIX_TYPE} fix to ${BRANCH}"

      - name: Comment on affected PR
        if: >
          steps.has-changes.outputs.has_changes == 'true' &&
          needs.classify-failure.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          FIX_TYPE="${{ steps.fix-type.outputs.fix_type }}"
          PR="${{ needs.classify-failure.outputs.pr_number }}"
          COMMIT_SHA=$(git rev-parse HEAD)

          BODY="## 🤖 Auto-fix Applied

          **Type:** \`${FIX_TYPE}\`
          **Commit:** \`${COMMIT_SHA:0:7}\`

          The CI autofix workflow detected and resolved a \`${FIX_TYPE}\` issue on this branch.

          | Detail | Value |
          |--------|-------|
          | Fix type | ${FIX_TYPE} |
          | Branch | \`${{ needs.classify-failure.outputs.branch }}\` |
          | Triggered by | ${{ github.event_name }} |

          The fix commit has been pushed. CI will re-run automatically.
          "

          gh pr comment "${PR}" --body "${BODY}"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Report unfixable failures for human attention
  # ──────────────────────────────────────────────────────────────────────────
  report-failure:
    name: Report Failure (${{ needs.classify-failure.outputs.classification }})
    runs-on: ubuntu-latest
    needs: classify-failure
    if: >
      needs.classify-failure.outputs.classification == 'test-failure' ||
      needs.classify-failure.outputs.classification == 'unknown'
    timeout-minutes: 5

    steps:
      - name: Generate hermes-maintainer app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: "3391977"
          private-key: ${{ secrets.HERMES_MAINTAINER_PRIVATE_KEY }}

      - name: Comment on PR or create issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLASSIFICATION: ${{ needs.classify-failure.outputs.classification }}
          BRANCH: ${{ needs.classify-failure.outputs.branch }}
          PR_NUMBER: ${{ needs.classify-failure.outputs.pr_number }}
          RUN_ID: ${{ needs.classify-failure.outputs.run_id }}
          SHA: ${{ needs.classify-failure.outputs.sha }}
        run: |
          RUN_LINK="[CI run #${RUN_ID}](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID})"

          if [ "${CLASSIFICATION}" = "test-failure" ]; then
            EMOJI="🧪"
            LABEL="ci-test-failure"
            TITLE="🧪 Test failure on \`${BRANCH}\`"
            DESCRIPTION="pytest tests failed on branch \`${BRANCH}\` (${SHA:0:7})."
          else
            EMOJI="❓"
            LABEL="ci-unknown-failure"
            TITLE="❓ Unrecognized CI failure on \`${BRANCH}\`"
            DESCRIPTION="CI failed on branch \`${BRANCH}\` (${SHA:0:7}) with an unclassified error."
          fi

          BODY="## ${EMOJI} CI Failure — \`${CLASSIFICATION}\`

          ${DESCRIPTION}

          | Detail | Value |
          |--------|-------|
          | Classification | \`${CLASSIFICATION}\` |
          | Branch | \`${BRANCH}\` |
          | Commit | \`${SHA:0:7}\` |
          | CI Run | ${RUN_LINK} |

          > ⚠️ **This failure was NOT auto-fixed** — it requires human judgment.

          _Tagged by the CI autofix workflow for human review._
          "

          if [ -n "${PR_NUMBER}" ]; then
            # Comment on the PR
            gh pr comment "${PR_NUMBER}" --body "${BODY}"
            echo "::notice::Reported ${CLASSIFICATION} failure on PR #${PR_NUMBER}"
          else
            # Create an issue for main branch failures
            # Ensure label exists
            gh label create "${LABEL}" \
              --color "FF0000" \
              --description "CI failures requiring human attention" \
              --force 2>/dev/null || true

            gh issue create \
              --title "${TITLE}" \
              --body "${BODY}" \
              --label "${LABEL}" \
              --assignee ""
            echo "::notice::Created issue for ${CLASSIFICATION} failure on ${BRANCH}"
          fi
