name: Infrastructure Validation

permissions:
  contents: read

on:
  push:
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure-validation.yml'
  pull_request:
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure-validation.yml'
  workflow_dispatch:

concurrency:
  group: infra-validation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docker-validation:
    name: Docker Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Hadolint on Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          dockerfile: infrastructure/docker/Dockerfile.api
          ignore: |
            DL3008
            DL3015
            DL4006
      - name: Run Hadolint on production Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          dockerfile: infrastructure/docker/Dockerfile.api.production
          ignore: |
            DL3008
            DL3015
            DL4006

      - name: Validate docker-compose files
        run: |
          for compose_file in infrastructure/docker/docker-compose*.yml; do
            echo "Validating $compose_file..."
            docker compose -f "$compose_file" config --quiet || exit 1
          done

  ansible-validation:
    name: Ansible Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Install Ansible dependencies
        run: |
          cd infrastructure/ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint on playbooks
        run: |
          ansible-lint infrastructure/ansible/playbooks/provision.yml || true
          ansible-lint infrastructure/ansible/playbooks/deploy-agent.yml || true

  terraform-validation:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform -chdir=infrastructure/terraform init -backend=false

      - name: Terraform validate
        run: |
          terraform -chdir=infrastructure/terraform validate

      - name: Terraform fmt check
        run: |
          terraform -chdir=infrastructure/terraform fmt -recursive -check

  monitoring-validation:
    name: Monitoring Config Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Prometheus config
        run: |
          docker run --rm -v $(pwd)/infrastructure/monitoring/prometheus:/etc/prometheus prom/prometheus:v2.54.1 \
            promtool check config /etc/prometheus/prometheus.yml

      - name: Validate Prometheus rules
        run: |
          docker run --rm -v $(pwd)/infrastructure/monitoring/prometheus:/etc/prometheus prom/prometheus:v2.54.1 \
            promtool check rules /etc/prometheus/alerts.yml
