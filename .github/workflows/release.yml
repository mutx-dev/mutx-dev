name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run canonical validation suite
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ci-test-site-key
          TURNSTILE_SECRET_KEY: ci-test-secret-key
          MUTX_SKIP_PLAYWRIGHT: "0"
          MUTX_SKIP_COMPOSE_SMOKE: "0"
        run: bash scripts/test.sh

  release-frontend:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          body_path: CHANGELOG.md

  release-cli:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cli-v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build package
        run: python -m build

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/cli-v}" >> $GITHUB_OUTPUT

      - name: Publish to PyPI
        if: github.event_name == 'push'
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Require Homebrew tap publish token
        if: github.event_name == 'push'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is required to publish mutx-dev/homebrew-tap." >&2
            exit 1
          fi

      - name: Checkout Homebrew tap
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          repository: mutx-dev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: published-homebrew-tap

      - name: Generate Homebrew formula
        if: github.event_name == 'push'
        run: |
          python scripts/generate_homebrew_formula.py \
            --repo-root . \
            --tag "${GITHUB_REF_NAME}" \
            --output "published-homebrew-tap/Formula/mutx.rb"
          ruby -c "published-homebrew-tap/Formula/mutx.rb"

      - name: Commit and push Homebrew formula
        if: github.event_name == 'push'
        working-directory: published-homebrew-tap
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if git diff --quiet -- Formula/mutx.rb; then
            echo "Homebrew tap already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mutx.rb
          git commit -m "Update mutx formula to ${VERSION}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: CLI Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          body_path: CHANGELOG.md
