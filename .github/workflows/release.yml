name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
      - 'cli-v*'
      - 'sdk-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run canonical validation suite
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ci-test-site-key
          TURNSTILE_SECRET_KEY: ci-test-secret-key
          MUTX_SKIP_PLAYWRIGHT: "0"
          MUTX_SKIP_COMPOSE_SMOKE: "0"
          MUTX_SKIP_DESKTOP_RELEASE: "1"
        run: bash scripts/test.sh

  release-app-desktop:
    needs: validate
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Configure macOS signing and notarization
        env:
          APPLE_DEVELOPER_ID_APP_CERT_B64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_B64 }}
          APPLE_DEVELOPER_ID_APP_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: bash desktop/scripts/setup-ci-signing.sh

      - name: Build
        run: npm run build

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Validate signed desktop release
        run: npm run desktop:release:validate

      - name: Generate desktop checksums
        run: npm run desktop:checksums

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          release_title="Release ${VERSION}"
          release_notes_file="docs/releases/v$(echo "${VERSION}" | cut -d. -f1-2).md"
          if [[ ! -f "${release_notes_file}" ]]; then
            release_notes_file="CHANGELOG.md"
          fi
          prerelease_flag=""
          if [[ "${GITHUB_REF_NAME}" == *alpha* || "${GITHUB_REF_NAME}" == *beta* ]]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${release_title}" \
              --notes-file "${release_notes_file}" \
              ${prerelease_flag}
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${release_title}" \
              --notes-file "${release_notes_file}" \
              ${prerelease_flag}
          fi

      - name: Upload signed desktop assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/desktop/MUTX-${VERSION}-macos-arm64.dmg" \
            "dist/desktop/MUTX-${VERSION}-macos-x64.dmg" \
            "dist/desktop/MUTX-${VERSION}-macos-arm64.zip" \
            "dist/desktop/MUTX-${VERSION}-macos-x64.zip" \
            "dist/desktop/MUTX-${VERSION}-SHA256SUMS.txt" \
            --clobber

  promote-production:
    needs: release-app-desktop
    if: startsWith(github.ref, 'refs/tags/v') && needs.release-app-desktop.result == 'success'
    uses: ./.github/workflows/railway-production-promotion.yml
    with:
      release_tag: ${{ github.ref_name }}
    secrets: inherit

  release-cli:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cli-v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build package
        run: python -m build

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/cli-v}" >> $GITHUB_OUTPUT

      - name: Publish to PyPI
        if: github.event_name == 'push'
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv run --with twine twine upload dist/*

      - name: Require Homebrew tap publish token
        if: github.event_name == 'push'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is required to publish mutx-dev/homebrew-tap." >&2
            exit 1
          fi

      - name: Checkout Homebrew tap
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          repository: mutx-dev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: published-homebrew-tap

      - name: Generate Homebrew formula
        if: github.event_name == 'push'
        run: |
          python scripts/generate_homebrew_formula.py \
            --repo-root . \
            --tag "${GITHUB_REF_NAME}" \
            --output "published-homebrew-tap/Formula/mutx.rb"
          ruby -c "published-homebrew-tap/Formula/mutx.rb"

      - name: Commit and push Homebrew formula
        if: github.event_name == 'push'
        working-directory: published-homebrew-tap
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if git diff --quiet -- Formula/mutx.rb; then
            echo "Homebrew tap already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mutx.rb
          git commit -m "Update mutx formula to ${VERSION}"
          git push origin HEAD:main

      - name: Create or update CLI GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          release_title="CLI Release ${VERSION}"
          prerelease_flag=""
          if [[ "${GITHUB_REF_NAME}" == *alpha* || "${GITHUB_REF_NAME}" == *beta* ]]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${release_title}" \
              --notes-file CHANGELOG.md \
              ${prerelease_flag}
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${release_title}" \
              --notes-file CHANGELOG.md \
              ${prerelease_flag}
          fi

  release-sdk:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    permissions:
      contents: write
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/sdk-v}" >> $GITHUB_OUTPUT

      - name: Publish to PyPI
        if: github.event_name == 'push'
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv run --with twine twine upload dist/*

      - name: Create or update SDK GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          release_title="SDK Release ${VERSION}"
          prerelease_flag=""
          if [[ "${GITHUB_REF_NAME}" == *alpha* || "${GITHUB_REF_NAME}" == *beta* ]]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${release_title}" \
              --notes-file README.md \
              ${prerelease_flag}
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${release_title}" \
              --notes-file README.md \
              ${prerelease_flag}
          fi
