name: Autonomous Dispatch Runner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip issue claiming and executor handoff'
        required: false
        default: 'true'
  issues:
    types:
      - opened
      - reopened
      - labeled
      - unlabeled
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - closed
  workflow_run:
    workflows:
      - Autonomous Executor Runner
    types:
      - completed

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autonomous-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    name: Claim and Dispatch Work Order
    runs-on: ubuntu-latest
    env:
      AUTONOMY_STALE_CLAIM_MINUTES: ${{ vars.AUTONOMY_STALE_CLAIM_MINUTES || '120' }}
      AUTONOMY_MAX_ACTIVE_SLOTS: ${{ vars.AUTONOMY_MAX_ACTIVE_SLOTS || '2' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release stale claimed issues
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const staleMinutes = parseInt(process.env.AUTONOMY_STALE_CLAIM_MINUTES || '120', 10);
            const cutoff = Date.now() - staleMinutes * 60 * 1000;

            const hasResolveKeyword = (text = '', issueNumber = '') => {
              const lower = String(text || '').toLowerCase();
              const needles = [
                `closes #${issueNumber}`,
                `fixes #${issueNumber}`,
                `resolves #${issueNumber}`,
              ];
              return needles.some((needle) => lower.includes(needle));
            };

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'autonomy:claimed',
              per_page: 100,
            });

            for (const issue of issues) {
              const updatedAt = new Date(issue.updated_at).getTime();
              if (Number.isNaN(updatedAt) || updatedAt >= cutoff) {
                continue;
              }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issue.number,
                per_page: 100,
              });

              const claimComment = [...comments].reverse().find(comment =>
                comment.body.includes('Autonomous dispatch claimed this task.') &&
                comment.body.includes('- branch: `')
              );

              let branchName = null;
              if (claimComment) {
                const match = claimComment.body.match(/- branch: `([^`]+)`/);
                branchName = match ? match[1] : null;
              }

              let hasOpenPr = false;
              if (branchName) {
                const openPrsForBranch = await github.paginate(github.rest.pulls.list, {
                  owner,
                  repo,
                  state: 'open',
                  head: `${owner}:${branchName}`,
                  per_page: 100,
                });
                hasOpenPr = openPrsForBranch.length > 0;
              }

              if (hasOpenPr) {
                continue;
              }

              const relatedPrs = await github.paginate(github.rest.search.issuesAndPullRequests, {
                q: `repo:${owner}/${repo} is:pr is:merged #${issue.number}`,
                per_page: 100,
              });

              const closeSignalPrs = relatedPrs.filter((item) =>
                item && item.pull_request && hasResolveKeyword(item.body || '', String(issue.number))
              );

              if (closeSignalPrs.length > 0) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: 'closed',
                }).catch(() => null);

                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: 'autonomy:claimed',
                }).catch(() => null);

                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: 'autonomy:ready',
                }).catch(() => null);

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: [
                    'Autonomous dispatch auto-resolved stale claim because a merged PR references this issue.',
                    '',
                    `- matching PR(s): ${closeSignalPrs.map((pr) => `#${pr.number}`).join(', ')}`,
                    '- this prevents endless reclaim/retry churn when resolution is already merged.',
                  ].join('\n'),
                }).catch(() => null);

                continue;
              }

              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: issue.number,
                name: 'autonomy:claimed',
              }).catch(() => null);

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: [
                  'Autonomous dispatch released this stale claim.',
                  '',
                  '- no open PR was found for the claimed branch' + (branchName ? ` - ${branchName}` : ''),
                  `- stale threshold: ${staleMinutes} minutes`,
                  '- the issue is eligible for re-dispatch',
                ].join('\n'),
              });
            }

      - name: Capture autonomy queue and health
        id: queue_health
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const fs = require('fs');
            const maxActiveSlots = parseInt(process.env.AUTONOMY_MAX_ACTIVE_SLOTS || '2', 10);

            const readyIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'autonomy:ready',
              per_page: 100,
            });
            const claimedIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'autonomy:claimed',
              per_page: 100,
            });
            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const hasLabel = (issue, labelName) =>
              (issue.labels || []).some((label) => (label && label.name) === labelName);

            const isAutonomyPr = (pullRequest) => {
              const title = String(pullRequest.title || '').toLowerCase();
              const body = String(pullRequest.body || '').toLowerCase();
              const headRef = String(pullRequest.head && pullRequest.head.ref || '');
              return (
                headRef.startsWith('autonomy/') ||
                title.startsWith('autonomy:') ||
                body.includes('autonomous implementation for #')
              );
            };

            const autonomyPrs = openPrs.filter(isAutonomyPr);
            const readyUnclaimedIssues = readyIssues.filter((issue) => !hasLabel(issue, 'autonomy:claimed'));

            const activeKeys = new Set();
            for (const issue of claimedIssues) {
              activeKeys.add(`issue:${issue.number}`);
            }
            for (const pullRequest of autonomyPrs) {
              const body = String(pullRequest.body || '');
              const matches = [...body.matchAll(/#(\d+)/g)];
              if (matches.length === 0) {
                activeKeys.add(`pr:${pullRequest.number}`);
                continue;
              }
              for (const match of matches) {
                activeKeys.add(`issue:${match[1]}`);
              }
            }

            const activeAutonomySlots = activeKeys.size;
            const freeSlots = Math.max(0, maxActiveSlots - activeAutonomySlots);
            const dispatchNeeded = readyUnclaimedIssues.length > 0 && freeSlots > 0;
            const idleGapViolation = readyUnclaimedIssues.length > 0 && freeSlots > 0 && activeAutonomySlots === 0;
            const violations = [];
            if (idleGapViolation) {
              violations.push('ready autonomy issues exist with free slots, but zero active autonomy claims/PRs are in flight');
            }

            const snapshot = {
              generated_at: new Date().toISOString(),
              max_active_slots: maxActiveSlots,
              open_autonomy_ready_issues: readyIssues.length,
              open_autonomy_ready_unclaimed_issues: readyUnclaimedIssues.length,
              open_autonomy_claimed_issues: claimedIssues.length,
              open_autonomy_pull_requests: autonomyPrs.length,
              active_autonomy_slots: activeAutonomySlots,
              free_slots: freeSlots,
              dispatch_needed: dispatchNeeded,
              violations,
            };

            fs.writeFileSync('autonomy-queue.json', JSON.stringify(readyIssues, null, 2));
            fs.writeFileSync('autonomy-queue-health.json', JSON.stringify(snapshot, null, 2));

            const lines = [
              '## Queue Health',
              '',
              `- open \`autonomy:ready\` issues: ${readyIssues.length}`,
              `- open \`autonomy:ready\` + unclaimed issues: ${readyUnclaimedIssues.length}`,
              `- open \`autonomy:claimed\` issues: ${claimedIssues.length}`,
              `- open autonomy PRs: ${autonomyPrs.length}`,
              `- active autonomy slots: ${activeAutonomySlots}/${maxActiveSlots}`,
              `- free slots: ${freeSlots}`,
              `- dispatch needed: ${dispatchNeeded ? 'yes' : 'no'}`,
            ];
            if (violations.length === 0) {
              lines.push('- status: healthy');
            } else {
              lines.push('- status: policy violation');
              lines.push('');
              for (const violation of violations) {
                lines.push(`- violation: ${violation}`);
                core.warning(`Queue policy violation: ${violation}`);
              }
            }
            await core.summary.addRaw(lines.join('\n')).write();

            core.setOutput('dispatch_needed', String(dispatchNeeded));
            core.setOutput('free_slots', String(freeSlots));
            core.setOutput('ready_unclaimed', String(readyUnclaimedIssues.length));

      - name: Upload queue health snapshot
        uses: actions/upload-artifact@v4
        with:
          name: autonomy-queue-health
          path: autonomy-queue-health.json

      - name: Build work order
        if: ${{ steps.queue_health.outputs.dispatch_needed == 'true' }}
        run: python scripts/autonomy/build_work_order.py --queue autonomy-queue.json --output autonomy-work-order.json

      - name: Show work order
        if: ${{ steps.queue_health.outputs.dispatch_needed == 'true' }}
        run: cat autonomy-work-order.json

      - name: Claim issue for autonomous execution
        if: ${{ steps.queue_health.outputs.dispatch_needed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import subprocess

          work_order = json.load(open('autonomy-work-order.json'))
          if work_order.get('status') == 'idle':
              raise SystemExit(0)

          issue = str(work_order['issue'])
          agent = work_order['agent']
          reviewer = work_order['reviewer']
          lane = work_order['lane']
          branch = work_order['branch']

          subprocess.run([
              'gh', 'issue', 'edit', issue,
              '--add-label', 'autonomy:claimed',
          ], check=True)

          subprocess.run([
              'gh', 'issue', 'comment', issue,
              '--body', (
                  f'Autonomous dispatch claimed this task.\\n\\n'
                  f'- authoring agent: `{agent}`\\n'
                  f'- reviewer agent: `{reviewer}`\\n'
                  f'- lane: `{lane}`\\n'
                  f'- branch: `{branch}`\\n'
                  f'- handoff: `autonomous-executor.yml`\\n'
              ),
          ], check=True)
          PY

      - name: Trigger executor workflow
        if: ${{ steps.queue_health.outputs.dispatch_needed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true') }}
        uses: actions/github-script@v7
        env:
          WORK_ORDER_PATH: autonomy-work-order.json
        with:
          script: |
            const fs = require('fs');
            const workOrder = JSON.parse(fs.readFileSync(process.env.WORK_ORDER_PATH, 'utf8'));
            if (workOrder.status === 'idle') {
              core.notice('No work order selected.');
              return;
            }

            const ref = context.payload.repository?.default_branch || 'main';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'autonomous-executor.yml',
              ref,
              inputs: {
                work_order_json: JSON.stringify(workOrder),
              },
            });

            await core.summary
              .addRaw([
                '',
                '## Dispatch Handoff',
                '',
                `- issue: #${workOrder.issue}`,
                `- branch: \`${workOrder.branch}\``,
                `- executor workflow: \`autonomous-executor.yml\``,
              ].join('\n'))
              .write();
