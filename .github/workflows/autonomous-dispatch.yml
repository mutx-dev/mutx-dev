name: Autonomous Dispatch Runner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip issue claiming and executor handoff'
        required: false
        default: 'true'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autonomous-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    name: Claim and Dispatch Work Order
    runs-on: ubuntu-latest
    env:
      AUTONOMY_STALE_CLAIM_MINUTES: ${{ vars.AUTONOMY_STALE_CLAIM_MINUTES || '120' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release stale claimed issues
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const staleMinutes = parseInt(process.env.AUTONOMY_STALE_CLAIM_MINUTES || '120', 10);
            const cutoff = Date.now() - staleMinutes * 60 * 1000;

            const hasResolveKeyword = (text = '', issueNumber = '') => {
              const lower = String(text || '').toLowerCase();
              const needles = [
                `closes #${issueNumber}`,
                `fixes #${issueNumber}`,
                `resolves #${issueNumber}`,
              ];
              return needles.some((needle) => lower.includes(needle));
            };

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'autonomy:claimed',
              per_page: 100,
            });

            for (const issue of issues) {
              const updatedAt = new Date(issue.updated_at).getTime();
              if (Number.isNaN(updatedAt) || updatedAt >= cutoff) {
                continue;
              }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issue.number,
                per_page: 100,
              });

              const claimComment = [...comments].reverse().find(comment =>
                comment.body.includes('Autonomous dispatch claimed this task.') &&
                comment.body.includes('- branch: `')
              );

              let branchName = null;
              if (claimComment) {
                const match = claimComment.body.match(/- branch: `([^`]+)`/);
                branchName = match ? match[1] : null;
              }

              let hasOpenPr = false;
              if (branchName) {
                const openPrsForBranch = await github.paginate(github.rest.pulls.list, {
                  owner,
                  repo,
                  state: 'open',
                  head: `${owner}:${branchName}`,
                  per_page: 100,
                });
                hasOpenPr = openPrsForBranch.length > 0;
              }

              if (hasOpenPr) {
                continue;
              }

              const relatedPrs = await github.paginate(github.rest.search.issuesAndPullRequests, {
                q: `repo:${owner}/${repo} is:pr is:merged #${issue.number}`,
                per_page: 100,
              });

              const closeSignalPrs = relatedPrs.filter((item) =>
                item && item.pull_request && hasResolveKeyword(item.body || '', String(issue.number))
              );

              if (closeSignalPrs.length > 0) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: 'closed',
                }).catch(() => null);

                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: 'autonomy:claimed',
                }).catch(() => null);

                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: 'autonomy:ready',
                }).catch(() => null);

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: [
                    'Autonomous dispatch auto-resolved stale claim because a merged PR references this issue.',
                    '',
                    `- matching PR(s): ${closeSignalPrs.map((pr) => `#${pr.number}`).join(', ')}`,
                    '- this prevents endless reclaim/retry churn when resolution is already merged.',
                  ].join('\n'),
                }).catch(() => null);

                continue;
              }

              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: issue.number,
                name: 'autonomy:claimed',
              }).catch(() => null);

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: [
                  'Autonomous dispatch released this stale claim.',
                  '',
                  '- no open PR was found for the claimed branch' + (branchName ? ` - ${branchName}` : ''),
                  `- stale threshold: ${staleMinutes} minutes`,
                  '- the issue is eligible for re-dispatch',
                ].join('\n'),
              });
            }

      - name: Capture autonomy queue and health
        id: queue_health
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const fs = require('fs');
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'autonomy:ready',
              per_page: 100,
            });
            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const emptyQueueViolation = issues.length === 0 && openPrs.length === 0;
            const stalledQueueViolation = issues.length > 0 && openPrs.length === 0;
            const violations = [];
            if (emptyQueueViolation) {
              violations.push('queue floor failed: zero autonomy:ready issues and zero open PRs');
            }
            if (stalledQueueViolation) {
              violations.push('queue handoff failed: autonomy:ready issues exist but zero open PRs');
            }

            const snapshot = {
              generated_at: new Date().toISOString(),
              open_autonomy_ready_issues: issues.length,
              open_pull_requests: openPrs.length,
              violations,
            };

            fs.writeFileSync('autonomy-queue.json', JSON.stringify(issues, null, 2));
            fs.writeFileSync('autonomy-queue-health.json', JSON.stringify(snapshot, null, 2));

            const lines = [
              '## Queue Health',
              '',
              `- open \`autonomy:ready\` issues: ${issues.length}`,
              `- open PRs: ${openPrs.length}`,
            ];
            if (violations.length === 0) {
              lines.push('- status: healthy');
            } else {
              lines.push('- status: policy violation');
              lines.push('');
              for (const violation of violations) {
                lines.push(`- violation: ${violation}`);
                core.warning(`Queue policy violation: ${violation}`);
              }
            }
            await core.summary.addRaw(lines.join('\n')).write();

            core.setOutput('empty_violation', String(emptyQueueViolation));
            core.setOutput('stalled_violation', String(stalledQueueViolation));

      - name: Upload queue health snapshot
        uses: actions/upload-artifact@v4
        with:
          name: autonomy-queue-health
          path: autonomy-queue-health.json

      - name: Report empty queue (non-fatal)
        if: ${{ steps.queue_health.outputs.empty_violation == 'true' }}
        run: |
          echo "Queue floor violation: no autonomy:ready issues and no open PRs (continuing)."
          cat autonomy-queue-health.json

      - name: Flag stalled queue handoff
        if: ${{ steps.queue_health.outputs.stalled_violation == 'true' }}
        run: |
          echo "Queue handoff violation: autonomy:ready issues exist but there are no open PRs."
          cat autonomy-queue-health.json

      - name: Build work order
        run: python scripts/autonomy/build_work_order.py --queue autonomy-queue.json --output autonomy-work-order.json

      - name: Show work order
        run: cat autonomy-work-order.json

      - name: Claim issue for autonomous execution
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          work_order = json.load(open('autonomy-work-order.json'))
          if work_order.get('status') == 'idle':
              raise SystemExit(0)

          issue = str(work_order['issue'])
          agent = work_order['agent']
          reviewer = work_order['reviewer']
          lane = work_order['lane']
          branch = work_order['branch']

          subprocess.run([
              'gh', 'issue', 'edit', issue,
              '--add-label', 'autonomy:claimed',
          ], check=True)

          subprocess.run([
              'gh', 'issue', 'comment', issue,
              '--body', (
                  f'Autonomous dispatch claimed this task.\\n\\n'
                  f'- authoring agent: `{agent}`\\n'
                  f'- reviewer agent: `{reviewer}`\\n'
                  f'- lane: `{lane}`\\n'
                  f'- branch: `{branch}`\\n'
              ),
          ], check=True)
          PY

      - name: Hand off to local executor
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          AUTONOMY_EXECUTOR_SETUP_CMD: ${{ vars.AUTONOMY_EXECUTOR_SETUP_CMD }}
          AUTONOMY_AGENT_CMD_TEMPLATE: ${{ vars.AUTONOMY_AGENT_CMD_TEMPLATE }}
          AUTONOMY_OPEN_PR: ${{ vars.AUTONOMY_OPEN_PR }}
          AUTONOMY_MODEL: ${{ vars.AUTONOMY_MODEL }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$AUTONOMY_EXECUTOR_SETUP_CMD" ]; then
            bash -lc "$AUTONOMY_EXECUTOR_SETUP_CMD"
          fi
          python scripts/autonomy/execute_work_order.py autonomy-work-order.json
