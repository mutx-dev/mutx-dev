name: Autonomous Shipping Control Tower

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  backlog:
    name: Backlog Intake
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build autonomy queue summary
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'autonomy:ready',
              per_page: 100,
            });

            const areaOrder = [
              'area:api',
              'area:web',
              'area:auth',
              'area:cli-sdk',
              'area:runtime',
              'area:test',
              'area:infra',
              'area:ops',
              'area:docs',
            ];

            const lines = ['## Autonomous Queue', ''];

            if (issues.length === 0) {
              lines.push('- no `autonomy:ready` issues found');
            } else {
              for (const area of areaOrder) {
                const matches = issues.filter(issue => issue.labels.some(label => label.name === area));
                if (matches.length === 0) continue;
                lines.push(`### ${area}`);
                for (const issue of matches.slice(0, 10)) {
                  const labels = issue.labels.map(label => label.name).join(', ');
                  lines.push(`- #${issue.number} ${issue.title} (${labels})`);
                }
                lines.push('');
              }
            }

            await core.summary.addRaw(lines.join('\n')).write();

      - name: Emit activation guidance
        run: |
          printf '%s\n' \
            'This workflow is the control-tower scaffold.' \
            'Connect it to a self-hosted runner or agent executor to convert the queue into authored PRs.'
