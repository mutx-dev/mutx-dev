name: Infrastructure CI

permissions:
  contents: read

on:
  push:
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure-ci.yml'
  pull_request:
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure-ci.yml'

concurrency:
  group: infra-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        id: fmt
        run: terraform -chdir=infrastructure/terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform init
        run: |
          for env in staging production; do
            terraform -chdir=infrastructure/terraform init \
              -backend=false \
              -backend-config=environments/$env/backend.hcl
          done

      - name: Terraform validate
        run: terraform -chdir=infrastructure/terraform validate

  ansible:
    name: Ansible
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r infrastructure/ansible/requirements.yml

      - name: Run ansible-lint
        run: ansible-lint infrastructure/ansible/

  dockerfile:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run hadolint
        run: |
          # Install hadolint
          curl -sL https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

          # Lint Dockerfiles
          hadolint infrastructure/docker/Dockerfile.api
          hadolint infrastructure/docker/Dockerfile.backend
          hadolint infrastructure/docker/Dockerfile.frontend
          hadolint infrastructure/docker/Dockerfile.api.production

  docker-compose:
    name: Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Validate canonical docker-compose files
        env:
          POSTGRES_PASSWORD: testpass
          REDIS_PASSWORD: testpass
          JWT_SECRET: test-secret-key-that-is-long-enough-32
          DATABASE_URL: postgresql://mutx:***@postgres:5432/mutx
          DATABASE_SSL_MODE: disable
          GRAFANA_ADMIN_PASSWORD: testpass
        run: |
          docker compose -f infrastructure/docker/docker-compose.yml config --quiet
          docker compose -f infrastructure/docker/docker-compose.prod.yml config --quiet
          docker compose -f infrastructure/docker/docker-compose.monitoring.yml config --quiet
          docker compose -f infrastructure/docker/otel-compose.yml config --quiet
