name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate dependency compatibility pins
        run: python scripts/check_requirements_compat.py

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run validation suite
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ci-test-site-key
          TURNSTILE_SECRET_KEY: ci-test-secret-key
          MUTX_SKIP_PLAYWRIGHT: "1"
        run: |
          bash scripts/test.sh

      - name: Run frontend smoke tests (informational)
        continue-on-error: true
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ci-test-site-key
          TURNSTILE_SECRET_KEY: ci-test-secret-key
        run: |
          npx playwright test --project=chromium

  migrations:
    name: Database Migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Validate migration state
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: |
          # Run alembic upgrade to apply all migrations (verifies they're valid)
          alembic upgrade head
          
          # Generate a test revision to check if models match migrations
          # If models differ from migrations, this will detect drift
          alembic revision --autogenerate --head=head 2>&1 | tee autogenerate_output.txt
          
          # Check if autogenerate produced any changes
          if grep -q "No changes detected" autogenerate_output.txt; then
            echo "✓ Models match migrations - no drift detected"
          else
            # If changes detected, show what was generated and fail
            echo "⚠ Warning: Model drift detected - new migrations may be needed"
            # Note: We don't fail here as this is a warning for developers
            # to review whether new migrations are actually needed
          fi
