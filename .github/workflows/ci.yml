name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect Changed Surfaces
    runs-on: ubuntu-latest

    outputs:
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}
      container: ${{ steps.filter.outputs.container }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - 'requirements.txt'
              - 'pyproject.toml'
              - 'src/api/**'
              - 'src/security/**'
              - 'cli/**'
              - 'sdk/**'
              - 'tests/api/**'
              - 'tests/unit/python/**'
              - 'tests/test_cli_*.py'
              - 'tests/test_generate_homebrew_formula.py'
              - 'tests/test_release_soft_launch.py'
              - 'tests/test_sdk_*.py'
              - 'tests/test_hosted_llm_executor.py'
              - 'scripts/check_requirements_compat.py'
            frontend:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'public/**'
              - 'src/api/**'
              - 'tests/unit/**'
              - 'tests/website.spec.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'eslint.config.mjs'
              - 'next.config.mjs'
              - 'docs/api/openapi.json'
              - 'scripts/verify-generated-artifacts.sh'
            container:
              - 'requirements.txt'
              - 'pyproject.toml'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.mjs'
              - 'infrastructure/docker/**'
              - 'Dockerfile'
              - '.github/workflows/ci.yml'

  python-validation:
    name: Python Validation
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.python == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Validate dependency compatibility pins
        run: python scripts/check_requirements_compat.py

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run Python lint and format checks
        run: |
          ruff check src/api cli sdk src/security
          ruff format --check src/api cli sdk src/security

      - name: Run Python compile check
        run: python -m compileall src/api cli sdk/mutx src/security

      - name: Run Python validation suite
        run: |
          python -m pytest \
            tests/api \
            tests/unit/python \
            tests/test_cli_*.py \
            tests/test_generate_homebrew_formula.py \
            tests/test_release_soft_launch.py \
            tests/test_sdk_*.py \
            tests/test_hosted_llm_executor.py \
            --maxfail=1 -q

  frontend-validation:
    name: Frontend Validation
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.frontend == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run frontend unit tests
        run: npm run test:app

      - name: Verify generated OpenAPI artifacts are current
        run: PYTHON_BIN=python bash scripts/verify-generated-artifacts.sh

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend typecheck
        run: npm run typecheck

  compose-smoke:
    name: Production Compose Smoke
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - python-validation
      - frontend-validation

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run production compose smoke test
        run: bash scripts/smoke-compose-prod.sh

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.container == 'true'

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.frontend
          load: true
          tags: mutx-frontend:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          scan-ref: 'mutx-frontend:latest'
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: container-scan
