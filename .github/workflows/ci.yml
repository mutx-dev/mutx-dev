name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate dependency compatibility pins
        run: python scripts/check_requirements_compat.py

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run validation suite
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ci-test-site-key
          TURNSTILE_SECRET_KEY: ci-test-secret-key
          MUTX_SKIP_PLAYWRIGHT: "1"
        run: |
          bash scripts/test.sh

      - name: Run frontend smoke tests (informational)
        continue-on-error: true
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ci-test-site-key
          TURNSTILE_SECRET_KEY: ci-test-secret-key
        run: |
          npx playwright test --project=chromium

  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run Python tests with coverage
        run: |
          python -m pytest tests/api --cov --cov-fail-under=70 --maxfail=1 -q

      - name: Run frontend tests with coverage
        run: |
          npm run test:app -- --coverage --coverageThreshold='{"global":{"branches":60,"functions":60,"lines":60,"statements":60}}'

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage/
            coverage_html/
          retention-days: 7

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    needs: validate

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: mutx-app:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scan-ref: 'mutx-app:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: container-scan

  database-migrations:
    name: Database Migration Check
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alembic sqlalchemy pgspecial psycopg2-binary

      - name: Check for uncommitted migrations
        run: |
          git stash push -m "temp-stash-before-migration-check" || true
          if alembic autogenerate --autogenerate 2>&1 | grep -q "No changes"; then
            echo "✓ No uncommitted migrations found"
          else
            echo "✗ Uncommitted migrations detected - please commit migration files"
            alembic autogenerate --autogenerate 2>&1
            git stash pop || true
            exit 1
          fi
          git stash pop || true

      - name: Verify migration syntax
        run: |
          if [ -d src/api/models/migrations/versions ] && [ $(ls -A src/api/models/migrations/versions/*.py 2>/dev/null | wc -l) -gt 0 ]; then
            for migration in src/api/models/migrations/versions/*.py; do
              python -m py_compile "$migration" || { echo "Syntax error in $migration"; exit 1; }
            done
            echo "✓ All migration files have valid syntax"
          else
            echo "✓ No migration files to check"
          fi
