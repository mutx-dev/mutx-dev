name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate dependency compatibility pins
        run: python scripts/check_requirements_compat.py

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run validation suite
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ci-test-site-key
          TURNSTILE_SECRET_KEY: ci-test-secret-key
          MUTX_SKIP_PLAYWRIGHT: "1"
        run: |
          bash scripts/test.sh

      - name: Run frontend smoke tests (informational)
        continue-on-error: true
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ci-test-site-key
          TURNSTILE_SECRET_KEY: ci-test-secret-key
        run: |
          npx playwright test --project=chromium
