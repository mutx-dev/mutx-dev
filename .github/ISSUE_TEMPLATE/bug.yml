name: Bug report
description: Report a reproducible problem in the app, API, CLI, SDK, docs, or infra workflows.
title: "bug: "
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - web
        - api
        - cli
        - sdk
        - docs
        - infra
        - testing
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the current behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Give the smallest set of steps needed to reproduce the problem.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share OS, Python/Node versions, browser, or anything else relevant.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, curl output, stack traces, or links.
