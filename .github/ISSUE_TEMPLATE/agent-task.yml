name: Agent task
description: Create a scoped task for the autonomous shipping loop.
title: "agent: "
labels:
  - autonomy:ready
body:
  - type: markdown
    attributes:
      value: |
        Keep this issue directly renderable on GitHub.

        - Use repo-relative paths in backticks, for example `docs/claim-to-reality-gap-matrix.md`.
        - Do not paste `file:///tmp/...` links or local absolute paths.
        - If a task comes from a doc audit, quote the exact claim and name the real source files.
  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - api
        - web
        - auth
        - cli-sdk
        - runtime
        - test
        - infra
        - ops
        - docs
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options:
        - low
        - medium
        - high
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Expected size
      options:
        - xs
        - s
        - m
        - l
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the smallest shippable change.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the checks or outcomes that define done.
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Likely files or surfaces
      description: Use repo-relative paths like `docs/api/openapi.json` or `src/api/routes/runtime.py`.
      placeholder: |
        docs/claim-to-reality-gap-matrix.md
        whitepaper.md
        docs/api/openapi.json
  - type: checkboxes
    id: guardrails
    attributes:
      label: Guardrails
      options:
        - label: This task does not require direct production access.
          required: true
        - label: This task can be completed as a PR instead of a direct push.
          required: true
