name: Agent task
description: Create a scoped task for the autonomous shipping loop.
title: "agent: "
labels:
  - autonomy:ready
body:
  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - api
        - web
        - auth
        - cli-sdk
        - runtime
        - test
        - infra
        - ops
        - docs
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options:
        - low
        - medium
        - high
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Expected size
      options:
        - xs
        - s
        - m
        - l
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the smallest shippable change.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the checks or outcomes that define done.
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Likely files or surfaces
  - type: checkboxes
    id: guardrails
    attributes:
      label: Guardrails
      options:
        - label: This task does not require direct production access.
          required: true
        - label: This task can be completed as a PR instead of a direct push.
          required: true
